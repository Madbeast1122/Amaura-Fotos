workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

    artifacts:
      - ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
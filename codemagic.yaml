workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest
      cocoapods: default
      node: 20

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx capacitor sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

    artifacts:
      - ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log